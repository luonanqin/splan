    s3-endpoint: https://files.massive.com
    bucket: flatfiles
    # 与 Python 一致：access_key_id → access-key，secret → secret-key；可用环境变量覆盖默认值
    access-key: ${MASSIVE_FLATFILES_ACCESS_KEY:223aff43-afda-4e47-a94f-69b5a864b7f6}
    secret-key: ${MASSIVE_FLATFILES_SECRET_KEY:Ea9FNNIdlWnVnGcoTpZsOWuCWEB3JAqY}